{{- $url := .Destination -}}
{{- if or (strings.HasPrefix $url "https://www.youtube.com/") (strings.HasPrefix $url "https://youtu.be/") -}}
  <div class="video-container" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;">
    <iframe src="https://www.youtube.com/embed/{{ replace (replace $url "https://youtu.be/" "") "https://www.youtube.com/watch?v=" "" }}" frameborder="0" allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe>
  </div>
{{- else -}}
  <a href="{{ $url }}"{{ with .Title }} title="{{ . }}"{{ end }}>{{ .Text | safeHTML }}</a>
{{- end -}}
